defaults:
  episodes: 5
  rounds: 30
  seed: 42

action_space:
  allowed:
    - cooperate
    - defect
    - defend
    - negotiate
    - abstain

shared_exposures:
  all_coop: &all_coop
    enabled: true
    start_round: 1
    peers:
      - id: "peer_alpha"
        action: "cooperate"
      - id: "peer_beta"
        action: "cooperate"

  mixed: &mixed
    enabled: true
    start_round: 1
    cycle: true
    pattern:
      - peers:
          - id: "peer_alpha"
            action: "cooperate"
          - id: "peer_beta"
            action: "negotiate"
      - peers:
          - id: "peer_alpha"
            action: "negotiate"
          - id: "peer_beta"
            action: "cooperate"

  all_defect: &all_defect
    enabled: true
    start_round: 1
    peers:
      - id: "peer_alpha"
        action: "defect"
      - id: "peer_beta"
        action: "defect"

  diverse: &diverse
    enabled: true
    start_round: 1
    cycle: true
    pattern:
      - peers:
          - id: "peer_alpha"
            action: "cooperate"
          - id: "peer_beta"
            action: "defect"
      - peers:
          - id: "peer_alpha"
            action: "defend"
          - id: "peer_beta"
            action: "negotiate"
      - peers:
          - id: "peer_alpha"
            action: "negotiate"
          - id: "peer_beta"
            action: "cooperate"
      - peers:
          - id: "peer_alpha"
            action: "defect"
          - id: "peer_beta"
            action: "defend"

shared_observation:
  blind: &blind_obs
    visibility_mode: "blind"
  aggregate: &aggregate_obs
    visibility_mode: "aggregate"

shared_prompt_configs:
  commons: &commons_prompt
    task_variant: "commons"
  hard_forbidden: &hard_forbidden_prompt
    norm_prompt_variant: "forbidden_hard"
  deontic_forbidden: &deontic_forbidden_prompt
    norm_prompt_variant: "forbidden_deontic"
  penalty_forbidden: &penalty_forbidden_prompt
    norm_prompt_variant: "forbidden_penalty_text"
  positive_reframe: &positive_reframe_prompt
    norm_prompt_variant: "positive_reframe"

